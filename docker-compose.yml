version: "3.9"

services:
  chroma:
    image: chromadb/chroma:latest
    container_name: naijasense-chroma
    ports:
      - "18000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

  naijasense-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: naijasense-api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      API_PREFIX: /api/v1
      ORCHESTRATOR_PROVIDER: ${ORCHESTRATOR_PROVIDER:-none}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ORCHESTRATOR_MODEL: ${ORCHESTRATOR_MODEL:-gpt-4o-mini}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      GROQ_ROUTER_MODEL: ${GROQ_ROUTER_MODEL:-llama-3.1-8b-instant}
      GROQ_GENERATOR_MODEL: ${GROQ_GENERATOR_MODEL:-llama-3.3-70b-versatile}
      GEN_TEMPERATURE: ${GEN_TEMPERATURE:-0.85}
      GEN_TOP_P: ${GEN_TOP_P:-0.9}
      GEN_PRESENCE_PENALTY: ${GEN_PRESENCE_PENALTY:-0.6}
      GEN_FREQUENCY_PENALTY: ${GEN_FREQUENCY_PENALTY:-0.5}
      GEN_MAX_TOKENS: ${GEN_MAX_TOKENS:-320}
      REVIEW_CRITIQUE_ENABLED: ${REVIEW_CRITIQUE_ENABLED:-true}
      REVIEW_CRITIQUE_THRESHOLD: ${REVIEW_CRITIQUE_THRESHOLD:-4}
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    depends_on:
      - chroma
    restart: unless-stopped

  naijasense-web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_AGENT_API_URL: http://127.0.0.1:8000/api/agent/v1
    container_name: naijasense-web
    ports:
      - "3000:3000"
    depends_on:
      - naijasense-api
    restart: unless-stopped

volumes:
  chroma_data: {}
